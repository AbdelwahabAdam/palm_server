[app:main]
use = egg:palm_app
pyramid.reload_templates = false
pyramid.includes =
    pyramid_tm

secret_key = %(SECRET_KEY)s
sqlalchemy.url = %(DATABASE_URL)s
s3_bucket = %(S3_BUCKET)s
aws_access_key_id = %(AWS_ACCESS_KEY_ID)s
aws_secret_access_key = %(AWS_SECRET_ACCESS_KEY)s
aws_region = %(AWS_REGION)s
smtp_host = %(SMTP_HOST)s
smtp_port = %(SMTP_PORT)s
smtp_user = %(SMTP_USER)s
smtp_password = %(SMTP_PASSWORD)s
smtp_from = %(SMTP_FROM)s
smtp_use_tls = %(SMTP_USE_TLS)s
frontend_url = %(FRONTEND_URL)s

[server:main]
use = egg:waitress#main
host = 0.0.0.0
port = 6543

[loggers]
keys = root, palm_app

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console

[logger_palm_app]
level = INFO
handlers =
qualname = palm_app

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
