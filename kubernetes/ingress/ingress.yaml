apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: palm-ingress
  namespace: palm-app
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    # For production with TLS:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: palm-app.local  # Replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 6543
  # Uncomment for TLS
  # tls:
  #   - hosts:
  #       - palm-app.local
  #     secretName: palm-tls-secret